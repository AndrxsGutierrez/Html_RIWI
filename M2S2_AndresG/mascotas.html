<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mis mascotas</title>
        <link rel="stylesheet" href="mascotas.css">
    </head>
    <body>
        <header>
            <h1>Mis Mascotas</h1>
            <nav aria-label="Navegacion principal">
                <ul class="menu">
                    <li><a class="lista" href="index.html">Inicio</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section class="cv" aria-labelledby="titulo-mascotas">
                <h2 id="titulo-mascotas" class="sr-only">Lista de mascotas</h2>

                <article class="cartas">
                    <figure>
                        <img src="./img/Perro.png" alt="Perro llamado Firulais">
                        <figcaption>
                            <h3>Firulais</h3>
                            <p>Es un perro.</p>
                        </figcaption>
                    </figure>
                </article>

                <article class="cartas">
                    <figure>
                        <img src="./img/Gato.png" alt="Gato llamado Ramon">
                        <figcaption>
                            <h3>Ramon</h3>
                            <p>Es un gato.</p>
                        </figcaption>
                    </figure>
                </article>

                <article class="cartas">
                    <figure>
                        <img src="./img/pajaro.png" alt="Pajaro llamado Piolin">
                        <figcaption>
                            <h3>Piolin</h3>
                            <p>Es un pajaro.</p>
                        </figcaption>
                    </figure>
                </article>

                <article class="cartas">
                    <figure>
                        <img src="./img/cabballo.png" alt="Caballo">
                        <figcaption>
                            <h3>Caballo</h3>
                            <p>Nombre pendiente.</p>
                        </figcaption>
                    </figure>
                </article>

                <article class="cartas">
                    <figure>
                        <img src="./img/hamster.png" alt="Hamster llamado Raton">
                        <figcaption>
                            <h3>Raton</h3>
                            <p>Es un hamster.</p>
                        </figcaption>
                    </figure>
                </article>

                <article class="cartas">
                    <figure>
                        <img src="./img/pavo.png" alt="Pavo llamado Pavo">
                        <figcaption>
                            <h3>Pavo</h3>
                            <p>Es un pavo.</p>
                        </figcaption>
                    </figure>
                </article>
            </section>
        </main>
    </body>
</html>
