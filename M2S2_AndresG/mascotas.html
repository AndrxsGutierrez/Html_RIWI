<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mis mascotas</title>
        <link rel="stylesheet" href="mascotas.css">
    </head>
    <body>
        <header>
            <h1>Mis Mascotas</h1>
            <nav aria-label="Navegacion principal">
                <ul class="menu_navegacion">
                    <li><a class="enlace_inicio" href="index.html">Inicio</a></li>
                </ul>
            </nav>
        </header>
        <main>
            <section class="galeria_mascotas" aria-labelledby="titulo-mascotas">
                <h2 id="titulo-mascotas" class="solo_lectores">Lista de mascotas</h2>

                <article class="tarjeta_mascota">
                    <figure>
                        <img src="./img/Perro.png" alt="Perro ">
                        <figcaption>
                            <h3>Firulais</h3>
                            <p>Firulais es un perro jugueton y le gusta estar con la familia.</p>
                        </figcaption>
                    </figure>
                </article>

                <article class="tarjeta_mascota">
                    <figure>
                        <img src="./img/Gato.png" alt="Gato">
                        <figcaption>
                            <h3>Duki</h3>
                            <p>Duki es un gato inquieto y curioso que pasa el dia molestando y explorando.</p>
                        </figcaption>
                    </figure>
                </article>

                <article class="tarjeta_mascota">
                    <figure>
                        <img src="./img/pajaro.png" alt="Pajaro ">
                        <figcaption>
                            <h3>Piolin</h3>
                            <p>Piolin es un pajaro pequeno y alegre.</p>
                        </figcaption>
                    </figure>
                </article>

                <article class="tarjeta_mascota">
                    <figure>
                        <img src="./img/cabballo.png" alt="Caballo">
                        <figcaption>
                            <h3>Zeus</h3>
                            <p>Zeus es un caballo inquieto y muy cariñoso.</p>
                        </figcaption>
                    </figure>
                </article>

                <article class="tarjeta_mascota">
                    <figure>
                        <img src="./img/hamster.png" alt="Hamster ">
                        <figcaption>
                            <h3>Stuart</h3>
                            <p>Stuart es un hamster pequeno y rapido que siempre esta jugando en su espacio.</p>
                        </figcaption>
                    </figure>
                </article>

                <article class="tarjeta_mascota">
                    <figure>
                        <img src="./img/pavo.png" alt="Pavo">
                        <figcaption>
                            <h3>Pavo</h3>
                            <p>Pavo es un ave no vuela solo abre sus alas.</p>
                        </figcaption>
                    </figure>
                </article>
            </section>
        </main>
    </body>
</html>
